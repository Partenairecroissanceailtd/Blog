name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

      # Notify IndexNow API of the latest URLs
      - name: Ping IndexNow
        run: |
          curl -s -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json" \
            -d '{
              "host": "www.partenairecroissance.com",
              "key": "de6f2892a78944ff9a96c5964e3e689f",
              "keyLocation": "https://www.partenairecroissance.com/de6f2892a78944ff9a96c5964e3e689f.txt",
              "urlList": [
                "https://www.partenairecroissance.com/",
                "https://www.partenairecroissance.com/blog/",
                "https://www.partenairecroissance.com/sdr/",
                "https://www.partenairecroissance.com/tradequote/"
              ]
            }'
